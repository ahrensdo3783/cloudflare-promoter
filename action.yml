name: 'Workers Release Promoter'
description: 'Turn a GitHub Release into a controlled Cloudflare Workers production promotion flow with staged rollout, smoke-test gating, and automatic rollback.'
author: 'TELVIN TEUM'

branding:
  icon: 'upload-cloud'
  color: 'orange'

inputs:
  # ── Cloudflare Auth ──
  cloudflare-api-token:
    description: 'Cloudflare API token with Workers deployment permissions. Can also be set via CLOUDFLARE_API_TOKEN env var.'
    required: false
  cloudflare-account-id:
    description: 'Cloudflare account ID. Can also be set via CLOUDFLARE_ACCOUNT_ID env var.'
    required: false

  # ── Worker Configuration ──
  worker-name:
    description: 'Name of the Cloudflare Worker to deploy. If omitted, resolved from wrangler config in working directory.'
    required: false
  working-directory:
    description: 'Working directory for the Worker project (where wrangler config lives). Defaults to repository root.'
    required: false
    default: '.'
  environment:
    description: 'Wrangler environment to deploy to (e.g., "production", "staging").'
    required: false
    default: 'production'

  # ── Promotion Strategy ──
  promotion-strategy:
    description: 'Promotion strategy: "immediate" (deploy and promote to 100%), "gradual" (incremental rollout), or "staging-only" (deploy and verify without promoting to production).'
    required: false
    default: 'immediate'
  gradual-steps:
    description: 'Comma-separated rollout percentages for gradual deployment (e.g., "10,50,100"). Only used when promotion-strategy is "gradual".'
    required: false
    default: '10,50,100'
  gradual-step-wait-seconds:
    description: 'Seconds to wait between gradual rollout steps before verification.'
    required: false
    default: '5'
  post-step-smoke-tests:
    description: 'Whether to run smoke tests after each gradual step (true/false).'
    required: false
    default: 'true'
  rollout-percentage:
    description: 'Deprecated alias for gradual-steps. Comma-separated rollout percentages. Use "100" for immediate full rollout.'
    required: false
    default: '100'

  # ── Smoke Testing ──
  smoke-test-url:
    description: 'URL to hit for post-deploy smoke test. If omitted, smoke testing is skipped.'
    required: false
  smoke-test-paths:
    description: 'Comma-separated additional paths to check relative to smoke-test-url (e.g., "/health,/api/status").'
    required: false
  smoke-test-expected-status:
    description: 'Expected HTTP status code from smoke test URL.'
    required: false
    default: '200'
  smoke-test-expected-body-contains:
    description: 'String that the smoke test response body must contain.'
    required: false
  smoke-test-timeout:
    description: 'Timeout in milliseconds for each smoke test request.'
    required: false
    default: '10000'
  smoke-test-retries:
    description: 'Number of retry attempts for each smoke check before failing.'
    required: false
    default: '3'
  smoke-test-retry-interval:
    description: 'Interval in milliseconds between smoke test retry attempts.'
    required: false
    default: '2000'
  smoke-test-deadline:
    description: 'Total deadline in milliseconds for all smoke tests to complete.'
    required: false
    default: '120000'
  smoke-test-command:
    description: 'Custom shell command to run as an additional smoke test. Runs after fetch-based checks.'
    required: false
  smoke-test-required:
    description: 'If false, smoke test failures produce warnings but do not block promotion.'
    required: false
    default: 'true'

  # ── General ──
  dry-run:
    description: 'If true, validate inputs and print the promotion plan without deploying.'
    required: false
    default: 'false'
  github-token:
    description: 'GitHub token for updating release notes and creating deployment statuses. Defaults to the automatic GITHUB_TOKEN.'
    required: false
    default: ${{ github.token }}

outputs:
  # ── Release Context ──
  release-tag:
    description: 'Git tag of the release that triggered this deployment.'
  release-id:
    description: 'GitHub Release ID.'

  # ── Deployment Metadata ──
  deployment-id:
    description: 'Cloudflare deployment ID of the promoted version.'
  worker-version-id:
    description: 'Cloudflare Worker version ID that was deployed.'
  staging-url:
    description: 'Staging URL (workers.dev) of the deployed Worker.'
  production-url:
    description: 'Production URL (custom domain) of the deployed Worker, if known.'
  deployment-url:
    description: 'Best available URL of the deployed Worker.'

  # ── Smoke Test ──
  smoke-test-status:
    description: 'Smoke test outcome: "passed", "failed", or "skipped".'
  smoke-test-passed:
    description: 'Whether smoke tests passed (true/false). Empty if skipped.'

  # ── Promotion ──
  promotion-status:
    description: 'Overall promotion status: "success", "staging-only", "rolled-back", "failed", or "dry-run".'
  promotion-result:
    description: 'Alias for promotion-status (backward compat).'

  # ── Rollback ──
  rollback-triggered:
    description: 'Whether an automatic rollback was triggered (true/false).'
  rollback-version-id:
    description: 'Version ID that was rolled back to, if rollback occurred.'

runs:
  using: 'node20'
  main: 'dist/index.js'
