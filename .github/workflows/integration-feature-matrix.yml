# ──────────────────────────────────────────────────────────
# Real Integration: Feature Matrix Validation
# ──────────────────────────────────────────────────────────
#
# This workflow validates major input combinations and release-note modes.
# Default behavior is safe dry-run validation.

name: Integration - Feature Matrix

on:
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Set false to execute live deployments across matrix entries'
        required: false
        default: 'true'
        type: boolean

permissions:
  contents: write
  deployments: write

jobs:
  matrix-validate:
    name: Matrix - ${{ matrix.strategy }} / ${{ matrix.release_note_mode }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - strategy: immediate
            release_note_mode: append
            gradual_steps: 100
          - strategy: gradual
            release_note_mode: replace-section
            gradual_steps: 10,50,100
          - strategy: staging-only
            release_note_mode: replace-section
            gradual_steps: 100

    steps:
      - name: Validate required secrets
        id: preflight
        shell: bash
        run: |
          ready=true

          if [ -z "${{ secrets.CLOUDFLARE_API_TOKEN }}" ]; then
            echo "::warning::Missing required secret: CLOUDFLARE_API_TOKEN"
            ready=false
          fi

          if [ "${{ secrets.CLOUDFLARE_API_TOKEN }}" = "REPLACE_WITH_REAL_CLOUDFLARE_API_TOKEN" ]; then
            echo "::warning::CLOUDFLARE_API_TOKEN is still set to placeholder text."
            ready=false
          fi

          if [ -z "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" ]; then
            echo "::warning::Missing required secret: CLOUDFLARE_ACCOUNT_ID"
            ready=false
          fi

          if [ "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" = "REPLACE_WITH_REAL_CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "::warning::CLOUDFLARE_ACCOUNT_ID is still set to placeholder text."
            ready=false
          fi

          echo "ready=${ready}" >> "$GITHUB_OUTPUT"

      - name: Skip notice when required secrets are missing
        if: steps.preflight.outputs.ready != 'true'
        shell: bash
        run: |
          echo "## Feature matrix run skipped" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Cloudflare secrets are required for matrix validation." >> "$GITHUB_STEP_SUMMARY"

      - name: Checkout repository
        if: steps.preflight.outputs.ready == 'true'
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: steps.preflight.outputs.ready == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        if: steps.preflight.outputs.ready == 'true'
        run: npm ci

      - name: Run matrix scenario
        if: steps.preflight.outputs.ready == 'true'
        id: scenario
        uses: BotCoder254/cloudflare-promoter@v1
        with:
          cloudflare-api-token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          cloudflare-account-id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          worker-name: ${{ vars.CF_WORKER_NAME }}
          working-directory: ${{ vars.CF_WORKING_DIRECTORY || '.' }}
          environment: ${{ vars.CF_ENVIRONMENT || 'production' }}
          promotion-strategy: ${{ matrix.strategy }}
          gradual-steps: ${{ matrix.gradual_steps }}
          gradual-step-wait-seconds: ${{ vars.CF_GRADUAL_STEP_WAIT_SECONDS || '20' }}
          smoke-test-url: ${{ vars.CF_STAGING_SMOKE_URL || vars.CF_PRODUCTION_SMOKE_URL }}
          smoke-test-expected-status: ${{ vars.CF_SMOKE_EXPECTED_STATUS || '200' }}
          smoke-test-expected-body-contains: ${{ vars.CF_SMOKE_EXPECTED_BODY }}
          smoke-test-retries: ${{ vars.CF_SMOKE_RETRIES || '2' }}
          smoke-test-retry-interval: ${{ vars.CF_SMOKE_RETRY_INTERVAL || '1500' }}
          auto-rollback: 'true'
          dry-run: ${{ github.event.inputs['dry-run'] || 'true' }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          release-note-mode: ${{ matrix.release_note_mode }}
          deployment-section-heading: ${{ vars.CF_DEPLOYMENT_SECTION_HEADING || 'Workers Production Promotion' }}

      - name: Matrix summary
        if: always() && steps.preflight.outputs.ready == 'true'
        shell: bash
        run: |
          echo "## Feature matrix result" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Property | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "| -------- | ----- |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Strategy | ${{ matrix.strategy }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Release-note mode | ${{ matrix.release_note_mode }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Promotion status | ${{ steps.scenario.outputs.promotion-status }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Smoke status | ${{ steps.scenario.outputs.smoke-test-status }} |" >> "$GITHUB_STEP_SUMMARY"
