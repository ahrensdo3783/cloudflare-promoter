# ──────────────────────────────────────────────────────────
# Real Integration: Promote Worker on Release Publish
# ──────────────────────────────────────────────────────────
#
# This workflow is designed for real production usage.
# It promotes a Cloudflare Worker when a GitHub Release is published.
#
# Required repository secrets:
#   - CLOUDFLARE_API_TOKEN
#   - CLOUDFLARE_ACCOUNT_ID
#
# Recommended repository variables:
#   - CF_WORKER_NAME
#   - CF_WORKING_DIRECTORY (default: .)
#   - CF_ENVIRONMENT (default: production)
#   - CF_GRADUAL_STEPS (default: 10,50,100)
#   - CF_GRADUAL_STEP_WAIT_SECONDS (default: 30)
#   - CF_PRODUCTION_SMOKE_URL
#   - CF_SMOKE_EXPECTED_STATUS (default: 200)
#   - CF_SMOKE_EXPECTED_BODY
#   - CF_SMOKE_RETRIES (default: 3)
#   - CF_SMOKE_RETRY_INTERVAL (default: 2000)
#   - CF_DEPLOYMENT_SECTION_HEADING (default: Workers Production Promotion)

name: Integration - Release Promotion

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Run in dry-run mode (validate only)'
        required: false
        default: 'false'
        type: boolean
      promotion-strategy:
        description: 'Promotion strategy'
        required: false
        default: 'gradual'
        type: choice
        options:
          - immediate
          - gradual
          - staging-only
      release-note-mode:
        description: 'Release-note update mode'
        required: false
        default: 'replace-section'
        type: choice
        options:
          - replace-section
          - append

permissions:
  contents: write
  deployments: write

jobs:
  promote:
    name: Promote Worker from Published Release
    runs-on: ubuntu-latest

    steps:
      - name: Validate integration configuration
        id: preflight
        shell: bash
        run: |
          ready=true

          if [ -z "${{ secrets.CLOUDFLARE_API_TOKEN }}" ]; then
            echo "::warning::Missing required secret: CLOUDFLARE_API_TOKEN"
            ready=false
          fi

          if [ "${{ secrets.CLOUDFLARE_API_TOKEN }}" = "REPLACE_WITH_REAL_CLOUDFLARE_API_TOKEN" ]; then
            echo "::warning::CLOUDFLARE_API_TOKEN is still set to placeholder text."
            ready=false
          fi

          if [ -z "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" ]; then
            echo "::warning::Missing required secret: CLOUDFLARE_ACCOUNT_ID"
            ready=false
          fi

          if [ "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" = "REPLACE_WITH_REAL_CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "::warning::CLOUDFLARE_ACCOUNT_ID is still set to placeholder text."
            ready=false
          fi

          if [ -z "${{ vars.CF_WORKER_NAME }}" ]; then
            echo "::warning::CF_WORKER_NAME is not set. The action will attempt wrangler config fallback."
          fi

          echo "ready=${ready}" >> "$GITHUB_OUTPUT"

      - name: Mark skipped when required secrets are missing
        if: steps.preflight.outputs.ready != 'true'
        shell: bash
        run: |
          echo "## Integration run skipped" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Required Cloudflare secrets are not configured." >> "$GITHUB_STEP_SUMMARY"

      - name: Checkout repository
        if: steps.preflight.outputs.ready == 'true'
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: steps.preflight.outputs.ready == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        if: steps.preflight.outputs.ready == 'true'
        run: npm ci

      - name: Promote Worker
        if: steps.preflight.outputs.ready == 'true'
        id: promote
        uses: BotCoder254/cloudflare-promoter@v1
        with:
          cloudflare-api-token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          cloudflare-account-id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          worker-name: ${{ vars.CF_WORKER_NAME || 'my-worker' }}
          working-directory: ${{ vars.CF_WORKING_DIRECTORY || '.github/integration/worker' }}
          environment: ${{ vars.CF_ENVIRONMENT || 'production' }}
          promotion-strategy: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs['promotion-strategy'] || 'gradual' }}
          gradual-steps: ${{ vars.CF_GRADUAL_STEPS || '10,50,100' }}
          gradual-step-wait-seconds: ${{ vars.CF_GRADUAL_STEP_WAIT_SECONDS || '30' }}
          post-step-smoke-tests: 'true'
          smoke-test-url: ${{ vars.CF_PRODUCTION_SMOKE_URL || 'https://example.com' }}
          smoke-test-expected-status: ${{ vars.CF_SMOKE_EXPECTED_STATUS || '200' }}
          smoke-test-expected-body-contains: ${{ vars.CF_SMOKE_EXPECTED_BODY || 'Example Domain' }}
          smoke-test-command: "node -e \"console.log('smoke command ok')\""
          smoke-test-retries: ${{ vars.CF_SMOKE_RETRIES || '3' }}
          smoke-test-retry-interval: ${{ vars.CF_SMOKE_RETRY_INTERVAL || '2000' }}
          auto-rollback: 'true'
          dry-run: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs['dry-run'] || 'false' }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          release-note-mode: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs['release-note-mode'] || 'replace-section' }}
          deployment-section-heading: ${{ vars.CF_DEPLOYMENT_SECTION_HEADING || 'Workers Production Promotion' }}

      - name: Deployment summary
        if: always() && steps.preflight.outputs.ready == 'true'
        shell: bash
        run: |
          echo "## Release promotion outputs" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Output | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "| ------ | ----- |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Release tag | ${{ steps.promote.outputs.release-tag }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Promotion status | ${{ steps.promote.outputs.promotion-status }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Worker name | ${{ steps.promote.outputs.worker-name }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Candidate version ID | ${{ steps.promote.outputs.candidate-version-id }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Deployment ID | ${{ steps.promote.outputs.deployment-id }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Staging URL | ${{ steps.promote.outputs.staging-url }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Production URL | ${{ steps.promote.outputs.production-url }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Smoke test | ${{ steps.promote.outputs.smoke-test-status }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Rollback triggered | ${{ steps.promote.outputs.rollback-triggered }} |" >> "$GITHUB_STEP_SUMMARY"

      - name: Fail on critical rollback failure
        if: steps.promote.outputs.promotion-status == 'failed-rollback-failed'
        run: |
          echo "::error::Deployment failed and rollback failed. Manual intervention is required."
          exit 1
