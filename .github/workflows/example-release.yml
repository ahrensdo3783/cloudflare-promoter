# ──────────────────────────────────────────────────────────
# Example: Deploy Cloudflare Worker on GitHub Release
# ──────────────────────────────────────────────────────────
#
# This workflow triggers when a new release is published,
# then uses workers-release-promoter to deploy the Worker
# with gradual rollout and smoke-test gating.
#
# Prerequisites:
#   1. Add CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID
#      as repository secrets.
#   2. Ensure your Worker project has a wrangler.toml/wrangler.jsonc
#      in the repository root (or adjust working-directory).

name: Deploy Worker on Release

on:
  release:
    types: [published]

  # Optional: allow manual triggering for testing
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Run in dry-run mode (validate only)'
        required: false
        default: 'false'
        type: boolean
      promotion-strategy:
        description: 'Promotion strategy'
        required: false
        default: 'gradual'
        type: choice
        options:
          - immediate
          - gradual
          - staging-only

permissions:
  contents: write       # To update release notes
  deployments: write    # To create deployment statuses

jobs:
  deploy:
    name: Deploy to Cloudflare Workers
    runs-on: ubuntu-latest
    if: ${{ secrets.CLOUDFLARE_API_TOKEN != '' && secrets.CLOUDFLARE_ACCOUNT_ID != '' }}

    steps:
      # -- Checkout --
      - name: Checkout repository
        uses: actions/checkout@v4

      # -- Setup Node.js --
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # -- Install dependencies --
      - name: Install dependencies
        run: npm ci

      # -- Deploy Worker --
      - name: Deploy Worker
        id: deploy
        uses: ./  # Use local action for testing; replace with BotCoder254/cloudflare-promoter@v1
        with:
          cloudflare-api-token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          cloudflare-account-id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          worker-name: my-worker
          environment: production
          promotion-strategy: ${{ github.event.inputs.promotion-strategy || 'gradual' }}
          gradual-steps: '10,50,100'
          gradual-step-wait-seconds: '30'
          smoke-test-url: https://my-worker.example.workers.dev/health
          smoke-test-expected-status: '200'
          smoke-test-expected-body-contains: '"status":"ok"'
          smoke-test-retries: '3'
          smoke-test-retry-interval: '2000'
          auto-rollback: 'true'
          dry-run: ${{ github.event.inputs.dry-run || 'false' }}
          release-note-mode: replace-section
          deployment-section-heading: Workers Production Promotion

      # -- Post-deployment summary --
      - name: Deployment Summary
        if: always()
        run: |
          echo "## Deployment Results"
          echo ""
          echo "| Output | Value |"
          echo "| ------ | ----- |"
          echo "| Release Tag | ${{ steps.deploy.outputs.release-tag }} |"
          echo "| Release URL | ${{ steps.deploy.outputs.release-url }} |"
          echo "| Workflow Run | ${{ steps.deploy.outputs.workflow-run-url }} |"
          echo "| Promotion Status | ${{ steps.deploy.outputs.promotion-status }} |"
          echo "| Worker Name | ${{ steps.deploy.outputs.worker-name }} |"
          echo "| Version ID | ${{ steps.deploy.outputs.worker-version-id }} |"
          echo "| Staging URL | ${{ steps.deploy.outputs.staging-url }} |"
          echo "| Production URL | ${{ steps.deploy.outputs.production-url }} |"
          echo "| Smoke Test | ${{ steps.deploy.outputs.smoke-test-status }} |"
          echo "| Rollback Triggered | ${{ steps.deploy.outputs.rollback-triggered }} |"
          echo "| Rollback Succeeded | ${{ steps.deploy.outputs.rollback-succeeded }} |"
          echo "| Post-Rollback Healthy | ${{ steps.deploy.outputs.post-rollback-healthy }} |"

      # -- Notify on critical failure --
      - name: Alert on rollback failure
        if: steps.deploy.outputs.promotion-status == 'failed-rollback-failed'
        run: |
          echo "::error::CRITICAL: Deployment failed AND rollback failed. Manual intervention required."
          echo "::error::Check the job summary for details and restore version ${{ steps.deploy.outputs.rollback-version-id }} manually."

      # -- Notify on standard failure --
      - name: Notify on failure
        if: failure() && steps.deploy.outputs.promotion-status != 'failed-rollback-failed'
        run: |
          echo "::error::Deployment failed or was rolled back."
          echo "Promotion status: ${{ steps.deploy.outputs.promotion-status }}"
          echo "Check the job summary for details."
