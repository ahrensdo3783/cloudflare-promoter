# ──────────────────────────────────────────────────────────
# Real Integration: PR Validation (Dry Run)
# ──────────────────────────────────────────────────────────
#
# This workflow validates deployment inputs and action behavior on pull requests
# without changing production traffic.

name: Integration - PR Validation

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:
    inputs:
      promotion-strategy:
        description: 'Validation strategy profile'
        required: false
        default: 'gradual'
        type: choice
        options:
          - immediate
          - gradual
          - staging-only

permissions:
  contents: read

jobs:
  validate:
    name: Validate Integration on PR
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false

    steps:
      - name: Validate required secrets
        id: preflight
        shell: bash
        run: |
          ready=true

          if [ -z "${{ secrets.CLOUDFLARE_API_TOKEN }}" ]; then
            echo "::warning::Missing required secret: CLOUDFLARE_API_TOKEN"
            ready=false
          fi

          if [ "${{ secrets.CLOUDFLARE_API_TOKEN }}" = "REPLACE_WITH_REAL_CLOUDFLARE_API_TOKEN" ]; then
            echo "::warning::CLOUDFLARE_API_TOKEN is still set to placeholder text."
            ready=false
          fi

          if [ -z "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" ]; then
            echo "::warning::Missing required secret: CLOUDFLARE_ACCOUNT_ID"
            ready=false
          fi

          if [ "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" = "REPLACE_WITH_REAL_CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "::warning::CLOUDFLARE_ACCOUNT_ID is still set to placeholder text."
            ready=false
          fi

          echo "ready=${ready}" >> "$GITHUB_OUTPUT"

      - name: Skip notice when secrets are unavailable
        if: steps.preflight.outputs.ready != 'true'
        shell: bash
        run: |
          echo "## PR integration validation skipped" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Cloudflare secrets are not available for this run (common for fork PRs)." >> "$GITHUB_STEP_SUMMARY"

      - name: Checkout repository
        if: steps.preflight.outputs.ready == 'true'
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: steps.preflight.outputs.ready == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        if: steps.preflight.outputs.ready == 'true'
        run: npm ci

      - name: Run action in dry-run mode
        if: steps.preflight.outputs.ready == 'true'
        id: validate
        uses: BotCoder254/cloudflare-promoter@v1
        with:
          cloudflare-api-token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          cloudflare-account-id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          worker-name: ${{ vars.CF_WORKER_NAME }}
          working-directory: ${{ vars.CF_WORKING_DIRECTORY || '.' }}
          environment: ${{ vars.CF_ENVIRONMENT || 'production' }}
          promotion-strategy: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs['promotion-strategy'] || 'gradual' }}
          gradual-steps: ${{ vars.CF_GRADUAL_STEPS || '10,50,100' }}
          gradual-step-wait-seconds: ${{ vars.CF_GRADUAL_STEP_WAIT_SECONDS || '30' }}
          smoke-test-url: ${{ vars.CF_STAGING_SMOKE_URL || vars.CF_PRODUCTION_SMOKE_URL }}
          smoke-test-expected-status: ${{ vars.CF_SMOKE_EXPECTED_STATUS || '200' }}
          smoke-test-expected-body-contains: ${{ vars.CF_SMOKE_EXPECTED_BODY }}
          dry-run: 'true'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          release-note-mode: 'replace-section'
          deployment-section-heading: ${{ vars.CF_DEPLOYMENT_SECTION_HEADING || 'Workers Production Promotion' }}

      - name: Validation summary
        if: always() && steps.preflight.outputs.ready == 'true'
        shell: bash
        run: |
          echo "## PR dry-run validation outputs" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Output | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "| ------ | ----- |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Promotion status | ${{ steps.validate.outputs.promotion-status }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Strategy | ${{ steps.validate.outputs.promotion-strategy }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Worker name | ${{ steps.validate.outputs.worker-name }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Workflow run URL | ${{ steps.validate.outputs.workflow-run-url }} |" >> "$GITHUB_STEP_SUMMARY"
